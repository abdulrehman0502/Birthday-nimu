<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimu ❤️</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:black;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* stars */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* glow */
.glow {
    color:#ff4da6;
    text-shadow:0 0 20px #ff4da6,0 0 40px #ff4da6;
}

button {
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4da6;
    color:white;
    margin:10px;
    cursor:pointer;
}

/* gallery */
.gallery img{
    width:130px;
    height:130px;
    margin:10px;
    border-radius:10px;
    transition:0.3s;
}
.gallery img:hover{transform:scale(1.2);}

/* lightbox */
#lightbox{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
}
#lightbox img{
    max-width:90%;
    margin-top:10%;
}

/* hearts */
.heart{
    position:fixed;
    bottom:0;
    animation:float 5s linear infinite;
}
@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="intro">
<h1 class="glow">Happy Birthday Nimu ❤️</h1>
<button onclick="start()">Enter 💖</button>
</div>

<div id="main" style="display:none">

<h2 id="typing"></h2>

<h3>Our Story 💞</h3>
<p>That first hand hold in 9th class… we were scared but it became unforgettable ❤️</p>
<p>Your first hug on my birthday… meant everything 💖</p>

<h3>Our Moments 📸</h3>
<div class="gallery">
<img src="img1.jpg" onclick="openImg(this)">
<img src="img2.jpg" onclick="openImg(this)">
<img src="img3.jpg" onclick="openImg(this)">
<img src="img4.jpg" onclick="openImg(this)">
<img src="img5.jpg" onclick="openImg(this)">
<img src="img6.jpg" onclick="openImg(this)">
<img src="img7.jpg" onclick="openImg(this)">
<img src="img8.jpg" onclick="openImg(this)">
</div>

<h3>Open When 💌</h3>
<button onclick="msg('miss')">Miss Me</button>
<button onclick="msg('sad')">Sad</button>
<button onclick="msg('night')">Can't Sleep</button>

<h3>Mini Game 💘</h3>
<p>Catch the heart ❤️</p>
<div id="game" style="height:200px;"></div>

<button onclick="surprise()">Final Surprise 🎁</button>

<div id="final" style="display:none">
<h2 class="glow">Will You Stay With Me Forever? ❤️</h2>
<button onclick="yes()">YES 💖</button>
</div>

</div>

<div id="lightbox" onclick="this.style.display='none'">
<img id="lightimg">
</div>

<audio id="music" loop>
<source src="song.mp3">
</audio>

<script>
/* start */
function start(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="block";
let music=document.getElementById("music");
music.volume=0;
music.play();
let fade=setInterval(()=>{
if(music.volume<1){music.volume+=0.05;}
else clearInterval(fade);
},200);
type();
}

/* typing */
let t="Nimu... you are my peace, my happiness, my everything ❤️";
let i=0;
function type(){
if(i<t.length){
document.getElementById("typing").innerHTML+=t[i];
i++;
setTimeout(type,40);
}
}

/* stars */
let c=document.getElementById("stars");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;
let stars=[];
for(let i=0;i<100;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height});
}
function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,2,2);
});
requestAnimationFrame(draw);
}
draw();

/* hearts */
setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="💖";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},200);

/* lightbox */
function openImg(img){
document.getElementById("lightbox").style.display="block";
document.getElementById("lightimg").src=img.src;
}

/* messages */
function msg(type){
if(type=="miss") alert("I miss you every second ❤️");
if(type=="sad") alert("I'm always here for you 💖");
if(type=="night") alert("Close your eyes and think of me ❤️");
}

/* game */
let g=document.getElementById("game");
setInterval(()=>{
let heart=document.createElement("span");
heart.innerHTML="❤️";
heart.style.position="absolute";
heart.style.left=Math.random()*90+"%";
heart.onclick=()=>{heart.remove();alert("You caught my heart 💘");};
g.appendChild(heart);
setTimeout(()=>heart.remove(),2000);
},800);

/* surprise */
function surprise(){
alert("I love you endlessly Nimu ❤️");
document.getElementById("final").style.display="block";
}

/* yes */
function yes(){
alert("Forever yours ❤️");
}
</script>

</body>
</html>
